name: Publish Packages

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'changeset-release/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm check:push

      - name: Build packages
        run: pnpm build
        env:
          COLORLESS_BUILD_SOURCEMAP: "false"

      - name: Build docs
        run: pnpm docs:build

      - name: Publish packages
        uses: changesets/action@v1
        with:
          publish: pnpm publish:ci
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_SECRET }}
