name: Publish NPM Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        run: |
          PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "${PACKAGE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag version: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_ENV}"

      - name: Sync package versions
        run: pnpm --filter './packages/*' exec npm pkg set version="${PACKAGE_VERSION}"

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        run: pnpm -r --filter './packages/*' publish --access public --no-git-checks --provenance
